description: >-
  Whippy uses a sales-assisted, tiered subscription model. Published tiers
  (Lite, Essentials, Growth, Premium, Professional) bundle a monthly SMS /
  message credit allocation plus platform features, with a Custom tier for
  negotiated volume pricing. Messaging is metered against the monthly credit
  allocation rather than billed per message; overage and carrier pass-through
  fees apply. The public REST API is available across plans; no separate
  per-call API price is published. Plan inclusions and credit-to-message
  conversion are not fully reconciled here.
notes: >-
  Monthly prices and credit allocations are as listed on the Whippy pricing
  page at capture time and are subject to change; confirm current tiers,
  feature inclusions, credit conversion, and overage rates with Whippy sales
  on reconciliation.
sources:
- https://www.whippy.ai/pricing
- https://www.whippy.ai/whippy-credits
- https://www.whippy.ai/pricing/voice-ai-pricing
