principles:
- name: Visibility
  description: Track monthly credit burn per channel and campaign / sequence against the plan allocation.
- name: Allocation
  description: Map channels, campaigns, sequences, and API keys to internal teams and cost centers.
- name: Optimization
  description: Right-size the plan tier to expected credit volume; control campaign / sequence send volume to avoid overage; reserve voice AI for high-value workflows.
- name: Accountability
  description: Assign owners per channel / campaign; review credit consumption and overage monthly against budget.
