description: >-
  FinOps view of Whippy spend. Whippy bills a fixed monthly subscription per
  plan tier that bundles a monthly message / SMS credit allocation, plus
  overage and carrier pass-through fees once the allocation is exhausted. Voice
  AI and certain channels carry their own usage rates. The largest cost drivers
  are credit consumption (SMS / MMS / email / fax volume), campaign and
  sequence send volume, and any voice AI minutes. Exact credit-to-message
  conversion and overage rates are sales-assisted and not reconciled here.
notes: >-
  Plan prices, included credits, overage rates, and voice pricing are subject
  to change; verify against the Whippy pricing pages and your order form during
  reconciliation.
